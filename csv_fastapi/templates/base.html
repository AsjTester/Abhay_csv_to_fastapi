<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student Data API{% endblock %}</title>
    <style>
        :root {
            --bg: #f4efe4;
            --panel: rgba(255, 250, 240, 0.92);
            --panel-strong: #fffaf2;
            --line: rgba(88, 67, 39, 0.16);
            --ink: #1f1a16;
            --muted: #625649;
            --accent: #0f766e;
            --accent-soft: rgba(15, 118, 110, 0.12);
            --warn: #9a3412;
            --shadow: 0 24px 50px rgba(53, 41, 23, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(15, 118, 110, 0.16), transparent 26%),
                radial-gradient(circle at top right, rgba(180, 83, 9, 0.16), transparent 24%),
                linear-gradient(180deg, #f9f5ec 0%, var(--bg) 100%);
        }

        a {
            color: inherit;
        }

        .shell {
            width: min(1180px, calc(100% - 28px));
            margin: 0 auto;
            padding: 24px 0 48px;
        }

        .topbar,
        .hero,
        .panel {
            border: 1px solid var(--line);
            border-radius: 24px;
            background: var(--panel);
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 16px 18px;
            margin-bottom: 18px;
        }

        .brand {
            font-weight: 800;
            letter-spacing: 0.04em;
            text-decoration: none;
            text-transform: uppercase;
        }

        .nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .nav a,
        .button,
        button {
            text-decoration: none;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.7);
            color: var(--ink);
            font: inherit;
            padding: 11px 14px;
            cursor: pointer;
        }

        .button.primary,
        button.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .hero {
            padding: 28px;
            margin-bottom: 18px;
        }

        .eyebrow {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(31, 26, 22, 0.06);
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1, h2, h3, p {
            margin-top: 0;
        }

        h1 {
            margin-bottom: 10px;
            font-size: clamp(2rem, 4vw, 3.8rem);
            line-height: 0.96;
        }

        .lead,
        .muted {
            color: var(--muted);
            line-height: 1.6;
        }

        .actions,
        .chips,
        .metrics,
        .grid,
        .detail-grid {
            display: grid;
            gap: 14px;
        }

        .actions {
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            margin-top: 20px;
        }

        .metrics {
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            margin-bottom: 18px;
        }

        .grid {
            grid-template-columns: minmax(0, 2fr) minmax(280px, 1fr);
        }

        .detail-grid {
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        }

        .panel {
            padding: 22px;
        }

        .metric-value {
            font-size: clamp(1.6rem, 3vw, 2.5rem);
            font-weight: 800;
            margin: 8px 0;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--ink);
            text-decoration: none;
        }

        .chips {
            grid-template-columns: repeat(auto-fit, minmax(180px, max-content));
            align-items: start;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 13px 10px;
            text-align: left;
            border-bottom: 1px solid rgba(88, 67, 39, 0.1);
        }

        th {
            color: var(--muted);
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
        }

        label {
            display: grid;
            gap: 6px;
            color: var(--muted);
            font-size: 0.94rem;
        }

        input,
        select {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 11px 12px;
            font: inherit;
            background: rgba(255, 255, 255, 0.88);
            color: var(--ink);
        }

        .stack {
            display: grid;
            gap: 18px;
        }

        .status-list {
            display: grid;
            gap: 12px;
        }

        .status-item,
        .notice {
            border-radius: 16px;
            border: 1px solid rgba(88, 67, 39, 0.1);
            background: var(--panel-strong);
            padding: 14px 16px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .notice.warn {
            color: var(--warn);
            background: rgba(154, 52, 18, 0.08);
            border-color: rgba(154, 52, 18, 0.2);
        }

        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-top: 18px;
            flex-wrap: wrap;
        }

        @media (max-width: 860px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .shell {
                width: min(100% - 18px, 1180px);
            }

            .topbar,
            .hero,
            .panel {
                border-radius: 18px;
            }

            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <a class="brand" href="/">Student Data API</a>
            <nav class="nav">
                <a href="/data/">All Students</a>
                <a href="/data/summary">Summary</a>
                <a href="/data/reload">Reload</a>
                <a href="/docs">Docs</a>
            </nav>
        </header>

        {% block hero %}{% endblock %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
